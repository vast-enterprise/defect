name: publish-crates

# 把 workspace 各 crate 发布到 crates.io。
#
# ⚠️ 目前仅手动触发，且默认 dry-run——发布准备就绪、但尚未真正首发。
# 真发布前需要：
#   1. 在仓库 Secrets 配好 CARGO_REGISTRY_TOKEN（crates.io API token）。
#   2. 确认各 crate 名未被占用、版本号已 bump。
#   3. 先跑一次 dry_run=true 确认每个 crate 都能 package 通过。
#
# 发布顺序按内部依赖拓扑排序：被依赖者先发，否则 crates.io 解析不到依赖版本。
# 顺序来源（真实 [dependencies]，已排除注释与 dev-deps）：
#   agent, sandbox 无内部依赖 → 最先
#   config/http/storage 依赖 agent
#   tools 依赖 agent+config；llm/mcp/obs 依赖 agent+http
#   acp 依赖 agent+tools+storage
#   cli 依赖所有
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "只 package 校验、不真正发布（强烈建议首次保持 true）"
        type: boolean
        default: true

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          # 拓扑顺序：被依赖的 crate 在前。
          CRATES=(
            defect-agent
            defect-sandbox
            defect-config
            defect-http
            defect-storage
            defect-tools
            defect-llm
            defect-mcp
            defect-obs
            defect-acp
            defect-cli
          )
          # 发布版本（与 workspace.package.version 对齐）。jq 是 GitHub runner 标配。
          VERSION="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="defect-cli") | .version')"
          echo "::notice::target version = $VERSION"

          # sparse index 路径规则：name≥4 字符 → {前两}/{次两}/{name}。
          # 返回 0 表示该 crate@VERSION 已在 crates.io 上存在。
          already_published() {
            local name="$1"
            local path="${name:0:2}/${name:2:2}/${name}"
            curl -fsSL "https://index.crates.io/${path}" 2>/dev/null \
              | grep -q "\"vers\":\"${VERSION}\""
          }

          FLAGS="--locked"
          if [ "$DRY_RUN" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
            echo "::notice::DRY RUN —— 仅 package 校验，不会真正发布"
          fi

          # crates.io 限流（来自其公开配置）：
          #   - 新 crate（首次发布某个名字）：burst 5，之后每 10 分钟补 1 个；
          #   - 已存在 crate 发新版本：burst 30，每分钟补 1 个（宽松得多）。
          # 首发本批 11 个全是“新 crate”，burst 5 之后必须每个间隔 >10 分钟，否则撞 429。
          # 取 11 分钟保守间隔。后续版本升级不是新 crate、不受此约束，但留间隔仍利于索引传播。
          SLEEP_BETWEEN=660

          published_this_run=0
          for i in "${!CRATES[@]}"; do
            c="${CRATES[$i]}"
            # 幂等：已发布的版本跳过，让失败后的 rerun 不会在已发的包上撞 “crate already exists”。
            # dry-run 不跳过——dry-run 的意义就是校验每个包都能 package。
            if [ "$DRY_RUN" != "true" ] && already_published "$c"; then
              echo "::notice::skip $c@$VERSION (already on crates.io)"
              continue
            fi

            # 在真发布且本 run 已经发过包的前提下，发下一个包前先等足限流间隔。
            # 把 sleep 放在“发布之前”而非之后，可天然避免最后一个包发完仍空等。
            if [ "$DRY_RUN" != "true" ] && [ "$published_this_run" -gt 0 ]; then
              echo "sleeping ${SLEEP_BETWEEN}s before publishing $c to respect crates.io rate limits..."
              sleep "$SLEEP_BETWEEN"
            fi

            echo "::group::publish $c"
            cargo publish -p "$c" $FLAGS
            echo "::endgroup::"
            published_this_run=$((published_this_run + 1))
          done
