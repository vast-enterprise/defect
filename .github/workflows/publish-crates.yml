name: publish-crates

# 把 workspace 各 crate 发布到 crates.io。
#
# ⚠️ 目前仅手动触发，且默认 dry-run——发布准备就绪、但尚未真正首发。
# 真发布前需要：
#   1. 在仓库 Secrets 配好 CARGO_REGISTRY_TOKEN（crates.io API token）。
#   2. 确认各 crate 名未被占用、版本号已 bump。
#   3. 先跑一次 dry_run=true 确认每个 crate 都能 package 通过。
#
# 发布顺序按内部依赖拓扑排序：被依赖者先发，否则 crates.io 解析不到依赖版本。
# 顺序来源（真实 [dependencies]，已排除注释与 dev-deps）：
#   agent, sandbox 无内部依赖 → 最先
#   config/http/storage 依赖 agent
#   tools 依赖 agent+config；llm/mcp/obs 依赖 agent+http
#   acp 依赖 agent+tools+storage
#   cli 依赖所有
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "只 package 校验、不真正发布（强烈建议首次保持 true）"
        type: boolean
        default: true

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          # 拓扑顺序：被依赖的 crate 在前。
          CRATES=(
            defect-agent
            defect-sandbox
            defect-config
            defect-http
            defect-storage
            defect-tools
            defect-llm
            defect-mcp
            defect-obs
            defect-acp
            defect-cli
          )
          # 发布版本（与 workspace.package.version 对齐）。jq 是 GitHub runner 标配。
          VERSION="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="defect-cli") | .version')"
          echo "::notice::target version = $VERSION"

          # sparse index 路径规则：name≥4 字符 → {前两}/{次两}/{name}。
          index_url() { local n="$1"; echo "https://index.crates.io/${n:0:2}/${n:2:2}/${n}"; }
          # 该 crate@VERSION 是否已在 crates.io 索引上。
          already_published() {
            curl -fsSL "$(index_url "$1")" 2>/dev/null | grep -q "\"vers\":\"${VERSION}\""
          }
          # 该 crate 名是否已存在（任意版本）。用来区分“首发新 crate”与“已有 crate 升版本”。
          crate_name_exists() {
            curl -fsSL "$(index_url "$1")" >/dev/null 2>&1
          }
          # 轮询等到 $1@VERSION 在索引出现（后续依赖它的 crate 才解析得到），或到上限放弃。
          # 升版本场景索引传播通常几~十几秒；上限只是兜底，不是常态等待。
          wait_until_indexed() {
            local c="$1" waited=0
            while [ "$waited" -lt "$WAIT_INDEX_MAX" ]; do
              if already_published "$c"; then
                echo "  $c@$VERSION visible in index after ${waited}s"
                return 0
              fi
              sleep "$WAIT_INDEX_POLL"
              waited=$((waited + WAIT_INDEX_POLL))
            done
            echo "::warning::$c@$VERSION not visible after ${WAIT_INDEX_MAX}s; proceeding anyway"
          }

          FLAGS="--locked"
          if [ "$DRY_RUN" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
            echo "::notice::DRY RUN —— 仅 package 校验，不会真正发布"
          fi

          # 升版本（crate 名已存在）：瓶颈只是索引传播，不是限流（burst 30/每分钟补 1，
          # 11 个包远在 burst 内）。所以不再盲等固定 70s，改为轮询“刚发的包已出现在索引”
          # 即继续——常态每包 ~10s，整套 ~2 分钟。
          WAIT_INDEX_POLL=5     # 轮询间隔
          WAIT_INDEX_MAX=90     # 索引可见性上限兜底
          # 首发新 crate 名：crates.io 对新名限流是 burst 5 + 每 ~10 分钟补 1，会直接拒绝过快的
          # 新 crate 发布。这无法靠轮询绕过，只能认命等够窗口。仅首次整套发布会撞到一次。
          SLEEP_NEW_CRATE=660

          for c in "${CRATES[@]}"; do
            # 幂等：已发布的版本跳过，让失败后的 rerun 不会在已发的包上撞 “crate already exists”。
            # dry-run 不跳过——dry-run 的意义就是校验每个包都能 package。
            if [ "$DRY_RUN" != "true" ] && already_published "$c"; then
              echo "::notice::skip $c@$VERSION (already on crates.io)"
              continue
            fi

            # 首发新 crate 名才需要等限流窗口（放在发布前；dry-run 不等）。
            if [ "$DRY_RUN" != "true" ] && ! crate_name_exists "$c"; then
              echo "sleeping ${SLEEP_NEW_CRATE}s before first-ever publish of new crate $c (crates.io new-crate rate limit)..."
              sleep "$SLEEP_NEW_CRATE"
            fi

            echo "::group::publish $c"
            cargo publish -p "$c" $FLAGS
            echo "::endgroup::"

            # 发布成功后轮询索引就绪，让下一个依赖它的 crate 解析得到（dry-run 没真发，跳过）。
            if [ "$DRY_RUN" != "true" ]; then
              wait_until_indexed "$c"
            fi
          done
