name: ci

# PR 与 main push 上的发布前质量门：格式、lint、测试、文档可编译。
# 与 CLAUDE.MD「修改后必做」一致（clippy -D warnings + fmt --check），
# 并额外校验 `cargo doc` 不出 warning——发 crates.io 前 docs.rs 会重跑文档构建，
# 这里先把 broken intra-doc link / 缺失 doc 拦在 CI。
on:
  push:
    branches: [main]
  pull_request:

# 同一 ref 上新 push 取消旧跑，省 runner。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  doc:
    name: doc
    runs-on: ubuntu-latest
    # broken intra-doc link / 裸 URL / 文档内代码错误 → 视为失败。覆盖私有项，
    # 比 docs.rs 更严：把整个 workspace 的文档质量钉死，防 doc-link 腐烂。
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --document-private-items

  # provider feature 裁剪不能 bit-rot：逐家 --no-default-features 单独编一遍。
  # 对齐 memory「Provider feature gating」——改 gate 后须跑各组合验证。
  features:
    name: feature-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider:
          - provider-anthropic
          - provider-bedrock
          - provider-openai
          - provider-deepseek
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p defect-cli --no-default-features --features ${{ matrix.provider }},yaml,repl,oneshot --locked
