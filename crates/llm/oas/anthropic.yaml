openapi: 3.1.0
info:
  title: Anthropic Messages API
  description: |
    本地版的 Anthropic API OAS。**只裁端点不裁字段**：当前仅
    挂 `/v1/models` 与 `/v1/messages` 两条 defect-llm 实际要走的
    路；这两条端点的 schema 全字段保留（含 citations、cache_control、
    image base64+url、document 全 4 种 source、thinking 3 种、
    tool_choice 4 种、所有 server tool 与 result 变体、Usage 全
    breakdown、SSE 8 类事件）。Anthropic 上游加字段时手动
    diff 同步对应 schema。
  version: "2023-06-01"

servers:
  - url: https://api.anthropic.com
    description: |
      Anthropic 官方 API endpoint。base_url 由 provider 在运行期通过
      `ANTHROPIC_BASE_URL` env 覆盖（codegen 不参与）。

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: |
        Anthropic 鉴权头。`anthropic-version: 2023-06-01` 由 provider
        层在每个请求里硬编码注入，不在 OAS 里声明（写在 OAS 里
        codegen 会出可空字段，每请求多一次 builder 调用，无意义）。

  schemas:
    # =========================================================================
    # /v1/models 相关
    # =========================================================================
    ModelInfo:
      type: object
      required: [type, id, display_name, created_at]
      properties:
        type:
          type: string
          enum: [model]
        id:
          type: string
          description: 模型 id，例如 "claude-3-5-sonnet-20241022"。
        display_name:
          type: string
        created_at:
          type: string
          format: date-time

    ListModelsResponse:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ModelInfo"
        has_more:
          type: boolean
        first_id:
          type: string
          nullable: true
        last_id:
          type: string
          nullable: true

    ErrorResponse:
      type: object
      required: [type, error]
      properties:
        type:
          type: string
          enum: [error]
        error:
          type: object
          required: [type, message]
          properties:
            type:
              type: string
              description: |
                Anthropic 错误分类：invalid_request_error /
                authentication_error / permission_error /
                not_found_error / rate_limit_error /
                api_error / overloaded_error。
            message:
              type: string

    # =========================================================================
    # 通用：cache_control / model 字面量
    # =========================================================================
    CacheControlEphemeral:
      type: object
      required: [type]
      description: 在该 content block 上插入缓存断点。
      properties:
        type:
          type: string
          enum: [ephemeral]
        ttl:
          type: string
          enum: ["5m", "1h"]
          description: 缓存断点 TTL，默认 5m。

    Model:
      description: |
        要使用的模型 id。允许任意字符串以容纳新发布版本，但同时
        枚举出当前已知的模型名作为 IDE 提示。
      oneOf:
        - type: string
          enum:
            - claude-opus-4-7
            - claude-mythos-preview
            - claude-opus-4-6
            - claude-sonnet-4-6
            - claude-haiku-4-5
            - claude-haiku-4-5-20251001
            - claude-opus-4-5
            - claude-opus-4-5-20251101
            - claude-sonnet-4-5
            - claude-sonnet-4-5-20250929
            - claude-opus-4-1
            - claude-opus-4-1-20250805
            - claude-opus-4-0
            - claude-opus-4-20250514
            - claude-sonnet-4-0
            - claude-sonnet-4-20250514
            - claude-3-haiku-20240307
        - type: string

    # =========================================================================
    # citations（请求参数版）
    # =========================================================================
    CitationCharLocationParam:
      type: object
      required: [cited_text, document_index, document_title, end_char_index, start_char_index, type]
      properties:
        cited_text: { type: string }
        document_index: { type: integer }
        document_title: { type: string }
        end_char_index: { type: integer }
        start_char_index: { type: integer }
        type:
          type: string
          enum: [char_location]

    CitationPageLocationParam:
      type: object
      required: [cited_text, document_index, document_title, end_page_number, start_page_number, type]
      properties:
        cited_text: { type: string }
        document_index: { type: integer }
        document_title: { type: string }
        end_page_number: { type: integer }
        start_page_number: { type: integer }
        type:
          type: string
          enum: [page_location]

    CitationContentBlockLocationParam:
      type: object
      required: [cited_text, document_index, document_title, end_block_index, start_block_index, type]
      properties:
        cited_text: { type: string }
        document_index: { type: integer }
        document_title: { type: string }
        end_block_index: { type: integer }
        start_block_index: { type: integer }
        type:
          type: string
          enum: [content_block_location]

    CitationWebSearchResultLocationParam:
      type: object
      required: [cited_text, encrypted_index, title, type, url]
      properties:
        cited_text: { type: string }
        encrypted_index: { type: string }
        title: { type: string }
        type:
          type: string
          enum: [web_search_result_location]
        url: { type: string }

    CitationSearchResultLocationParam:
      type: object
      required: [cited_text, end_block_index, search_result_index, source, start_block_index, title, type]
      properties:
        cited_text: { type: string }
        end_block_index: { type: integer }
        search_result_index: { type: integer }
        source: { type: string }
        start_block_index: { type: integer }
        title: { type: string }
        type:
          type: string
          enum: [search_result_location]

    TextCitationParam:
      oneOf:
        - $ref: "#/components/schemas/CitationCharLocationParam"
        - $ref: "#/components/schemas/CitationPageLocationParam"
        - $ref: "#/components/schemas/CitationContentBlockLocationParam"
        - $ref: "#/components/schemas/CitationWebSearchResultLocationParam"
        - $ref: "#/components/schemas/CitationSearchResultLocationParam"

    # =========================================================================
    # citations（响应版，多了 file_id 字段）
    # =========================================================================
    CitationCharLocation:
      type: object
      required: [cited_text, document_index, document_title, end_char_index, start_char_index, type]
      properties:
        cited_text: { type: string }
        document_index: { type: integer }
        document_title: { type: string }
        end_char_index: { type: integer }
        start_char_index: { type: integer }
        file_id: { type: string }
        type:
          type: string
          enum: [char_location]

    CitationPageLocation:
      type: object
      required: [cited_text, document_index, document_title, end_page_number, start_page_number, type]
      properties:
        cited_text: { type: string }
        document_index: { type: integer }
        document_title: { type: string }
        end_page_number: { type: integer }
        start_page_number: { type: integer }
        file_id: { type: string }
        type:
          type: string
          enum: [page_location]

    CitationContentBlockLocation:
      type: object
      required: [cited_text, document_index, document_title, end_block_index, start_block_index, type]
      properties:
        cited_text: { type: string }
        document_index: { type: integer }
        document_title: { type: string }
        end_block_index: { type: integer }
        start_block_index: { type: integer }
        file_id: { type: string }
        type:
          type: string
          enum: [content_block_location]

    CitationsWebSearchResultLocation:
      type: object
      required: [cited_text, encrypted_index, title, type, url]
      properties:
        cited_text: { type: string }
        encrypted_index: { type: string }
        title: { type: string }
        type:
          type: string
          enum: [web_search_result_location]
        url: { type: string }

    CitationsSearchResultLocation:
      type: object
      required: [cited_text, end_block_index, search_result_index, source, start_block_index, title, type]
      properties:
        cited_text: { type: string }
        end_block_index: { type: integer }
        search_result_index: { type: integer }
        source: { type: string }
        start_block_index: { type: integer }
        title: { type: string }
        type:
          type: string
          enum: [search_result_location]

    TextCitation:
      oneOf:
        - $ref: "#/components/schemas/CitationCharLocation"
        - $ref: "#/components/schemas/CitationPageLocation"
        - $ref: "#/components/schemas/CitationContentBlockLocation"
        - $ref: "#/components/schemas/CitationsWebSearchResultLocation"
        - $ref: "#/components/schemas/CitationsSearchResultLocation"

    CitationsConfigParam:
      type: object
      properties:
        enabled:
          type: boolean

    CitationsConfig:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean

    # =========================================================================
    # caller —— tool_use / server_tool_use / 各 result 都引用
    # =========================================================================
    DirectCaller:
      type: object
      required: [type]
      description: 模型直接调起的工具调用。
      properties:
        type:
          type: string
          enum: [direct]

    ServerToolCaller:
      type: object
      required: [tool_id, type]
      description: 由 server-side tool 触发的子调用。
      properties:
        tool_id: { type: string }
        type:
          type: string
          enum: [code_execution_20250825]

    ServerToolCaller20260120:
      type: object
      required: [tool_id, type]
      properties:
        tool_id: { type: string }
        type:
          type: string
          enum: [code_execution_20260120]

    Caller:
      oneOf:
        - $ref: "#/components/schemas/DirectCaller"
        - $ref: "#/components/schemas/ServerToolCaller"
        - $ref: "#/components/schemas/ServerToolCaller20260120"

    # =========================================================================
    # source 子类型
    # =========================================================================
    Base64ImageSource:
      type: object
      required: [data, media_type, type]
      properties:
        data: { type: string }
        media_type:
          type: string
          enum: [image/jpeg, image/png, image/gif, image/webp]
        type:
          type: string
          enum: [base64]

    URLImageSource:
      type: object
      required: [type, url]
      properties:
        type:
          type: string
          enum: [url]
        url: { type: string }

    ImageSource:
      oneOf:
        - $ref: "#/components/schemas/Base64ImageSource"
        - $ref: "#/components/schemas/URLImageSource"

    Base64PDFSource:
      type: object
      required: [data, media_type, type]
      properties:
        data: { type: string }
        media_type:
          type: string
          enum: [application/pdf]
        type:
          type: string
          enum: [base64]

    PlainTextSource:
      type: object
      required: [data, media_type, type]
      properties:
        data: { type: string }
        media_type:
          type: string
          enum: [text/plain]
        type:
          type: string
          enum: [text]

    ContentBlockSourceContent:
      oneOf:
        - $ref: "#/components/schemas/TextBlockParam"
        - $ref: "#/components/schemas/ImageBlockParam"

    ContentBlockSource:
      type: object
      required: [content, type]
      properties:
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/ContentBlockSourceContent"
        type:
          type: string
          enum: [content]

    URLPDFSource:
      type: object
      required: [type, url]
      properties:
        type:
          type: string
          enum: [url]
        url: { type: string }

    DocumentSource:
      oneOf:
        - $ref: "#/components/schemas/Base64PDFSource"
        - $ref: "#/components/schemas/PlainTextSource"
        - $ref: "#/components/schemas/ContentBlockSource"
        - $ref: "#/components/schemas/URLPDFSource"

    WebFetchDocumentSource:
      oneOf:
        - $ref: "#/components/schemas/Base64PDFSource"
        - $ref: "#/components/schemas/PlainTextSource"

    # =========================================================================
    # ContentBlockParam 14 变体（请求体里 messages[].content 用）
    # =========================================================================
    TextBlockParam:
      type: object
      required: [text, type]
      properties:
        text: { type: string }
        type:
          type: string
          enum: [text]
        cache_control:
          $ref: "#/components/schemas/CacheControlEphemeral"
        citations:
          type: array
          items:
            $ref: "#/components/schemas/TextCitationParam"

    ImageBlockParam:
      type: object
      required: [source, type]
      properties:
        source:
          $ref: "#/components/schemas/ImageSource"
        type:
          type: string
          enum: [image]
        cache_control:
          $ref: "#/components/schemas/CacheControlEphemeral"

    DocumentBlockParam:
      type: object
      required: [source, type]
      properties:
        source:
          $ref: "#/components/schemas/DocumentSource"
        type:
          type: string
          enum: [document]
        cache_control:
          $ref: "#/components/schemas/CacheControlEphemeral"
        citations:
          $ref: "#/components/schemas/CitationsConfigParam"
        context:
          type: string
        title:
          type: string

    SearchResultBlockParam:
      type: object
      required: [content, source, title, type]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/TextBlockParam"
        source: { type: string }
        title: { type: string }
        type:
          type: string
          enum: [search_result]
        cache_control:
          $ref: "#/components/schemas/CacheControlEphemeral"
        citations:
          $ref: "#/components/schemas/CitationsConfigParam"

    ThinkingBlockParam:
      type: object
      required: [signature, thinking, type]
      properties:
        signature: { type: string }
        thinking: { type: string }
        type:
          type: string
          enum: [thinking]

    RedactedThinkingBlockParam:
      type: object
      required: [data, type]
      properties:
        data: { type: string }
        type:
          type: string
          enum: [redacted_thinking]

    ToolUseBlockParam:
      type: object
      required: [id, input, name, type]
      properties:
        id: { type: string }
        input:
          type: object
          additionalProperties: true
        name: { type: string }
        type:
          type: string
          enum: [tool_use]
        cache_control:
          $ref: "#/components/schemas/CacheControlEphemeral"
        caller:
          $ref: "#/components/schemas/Caller"

    ToolReferenceBlockParam:
      type: object
      required: [tool_name, type]
      description: 可在 tool_result 内容里出现的 tool 引用 block。
      properties:
        tool_name: { type: string }
        type:
          type: string
          enum: [tool_reference]
        cache_control:
          $ref: "#/components/schemas/CacheControlEphemeral"

    ToolResultBlockParamContent:
      oneOf:
        - $ref: "#/components/schemas/TextBlockParam"
        - $ref: "#/components/schemas/ImageBlockParam"
        - $ref: "#/components/schemas/SearchResultBlockParam"
        - $ref: "#/components/schemas/DocumentBlockParam"
        - $ref: "#/components/schemas/ToolReferenceBlockParam"

    ToolResultBlockParam:
      type: object
      required: [tool_use_id, type]
      properties:
        tool_use_id: { type: string }
        type:
          type: string
          enum: [tool_result]
        cache_control:
          $ref: "#/components/schemas/CacheControlEphemeral"
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/ToolResultBlockParamContent"
        is_error:
          type: boolean

    ServerToolUseBlockParam:
      type: object
      required: [id, input, name, type]
      properties:
        id: { type: string }
        input:
          type: object
          additionalProperties: true
        name:
          type: string
          enum:
            - web_search
            - web_fetch
            - code_execution
            - bash_code_execution
            - text_editor_code_execution
            - tool_search_tool_regex
            - tool_search_tool_bm25
        type:
          type: string
          enum: [server_tool_use]
        cache_control:
          $ref: "#/components/schemas/CacheControlEphemeral"
        caller:
          $ref: "#/components/schemas/Caller"

    # web_search result 子类型（请求里复用）
    WebSearchResultBlockParam:
      type: object
      required: [encrypted_content, title, type, url]
      properties:
        encrypted_content: { type: string }
        title: { type: string }
        type:
          type: string
          enum: [web_search_result]
        url: { type: string }
        page_age:
          type: string

    WebSearchToolRequestError:
      type: object
      required: [error_code, type]
      properties:
        error_code:
          type: string
          enum:
            - invalid_tool_input
            - unavailable
            - max_uses_exceeded
            - too_many_requests
            - query_too_long
            - request_too_large
        type:
          type: string
          enum: [web_search_tool_result_error]

    WebSearchToolResultBlockParamContent:
      oneOf:
        - type: array
          items:
            $ref: "#/components/schemas/WebSearchResultBlockParam"
        - $ref: "#/components/schemas/WebSearchToolRequestError"

    WebSearchToolResultBlockParam:
      type: object
      required: [content, tool_use_id, type]
      properties:
        content:
          $ref: "#/components/schemas/WebSearchToolResultBlockParamContent"
        tool_use_id: { type: string }
        type:
          type: string
          enum: [web_search_tool_result]
        cache_control:
          $ref: "#/components/schemas/CacheControlEphemeral"
        caller:
          $ref: "#/components/schemas/Caller"

    WebFetchToolResultErrorBlockParam:
      type: object
      required: [error_code, type]
      properties:
        error_code:
          type: string
          enum:
            - invalid_tool_input
            - url_too_long
            - url_not_allowed
            - url_not_accessible
            - unsupported_content_type
            - too_many_requests
            - max_uses_exceeded
            - unavailable
        type:
          type: string
          enum: [web_fetch_tool_result_error]

    WebFetchBlockParam:
      type: object
      required: [content, type, url]
      properties:
        content:
          $ref: "#/components/schemas/DocumentBlockParam"
        type:
          type: string
          enum: [web_fetch_result]
        url:
          type: string
          description: Fetched content URL
        retrieved_at:
          type: string
          description: ISO 8601 时间戳

    WebFetchToolResultBlockParamContent:
      oneOf:
        - $ref: "#/components/schemas/WebFetchToolResultErrorBlockParam"
        - $ref: "#/components/schemas/WebFetchBlockParam"

    WebFetchToolResultBlockParam:
      type: object
      required: [content, tool_use_id, type]
      properties:
        content:
          $ref: "#/components/schemas/WebFetchToolResultBlockParamContent"
        tool_use_id: { type: string }
        type:
          type: string
          enum: [web_fetch_tool_result]
        cache_control:
          $ref: "#/components/schemas/CacheControlEphemeral"
        caller:
          $ref: "#/components/schemas/Caller"

    CodeExecutionOutputBlockParam:
      type: object
      required: [file_id, type]
      properties:
        file_id: { type: string }
        type:
          type: string
          enum: [code_execution_output]

    CodeExecutionToolResultErrorParam:
      type: object
      required: [error_code, type]
      properties:
        error_code:
          type: string
          enum:
            - invalid_tool_input
            - unavailable
            - too_many_requests
            - execution_time_exceeded
        type:
          type: string
          enum: [code_execution_tool_result_error]

    CodeExecutionResultBlockParam:
      type: object
      required: [content, return_code, stderr, stdout, type]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/CodeExecutionOutputBlockParam"
        return_code: { type: integer }
        stderr: { type: string }
        stdout: { type: string }
        type:
          type: string
          enum: [code_execution_result]

    EncryptedCodeExecutionResultBlockParam:
      type: object
      required: [content, encrypted_stdout, return_code, stderr, type]
      description: PFC + web_search 加密 stdout 的代码执行结果。
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/CodeExecutionOutputBlockParam"
        encrypted_stdout: { type: string }
        return_code: { type: integer }
        stderr: { type: string }
        type:
          type: string
          enum: [encrypted_code_execution_result]

    CodeExecutionToolResultBlockParamContent:
      oneOf:
        - $ref: "#/components/schemas/CodeExecutionToolResultErrorParam"
        - $ref: "#/components/schemas/CodeExecutionResultBlockParam"
        - $ref: "#/components/schemas/EncryptedCodeExecutionResultBlockParam"

    CodeExecutionToolResultBlockParam:
      type: object
      required: [content, tool_use_id, type]
      properties:
        content:
          $ref: "#/components/schemas/CodeExecutionToolResultBlockParamContent"
        tool_use_id: { type: string }
        type:
          type: string
          enum: [code_execution_tool_result]
        cache_control:
          $ref: "#/components/schemas/CacheControlEphemeral"

    BashCodeExecutionOutputBlockParam:
      type: object
      required: [file_id, type]
      properties:
        file_id: { type: string }
        type:
          type: string
          enum: [bash_code_execution_output]

    BashCodeExecutionToolResultErrorParam:
      type: object
      required: [error_code, type]
      properties:
        error_code:
          type: string
          enum:
            - invalid_tool_input
            - unavailable
            - too_many_requests
            - execution_time_exceeded
            - output_file_too_large
        type:
          type: string
          enum: [bash_code_execution_tool_result_error]

    BashCodeExecutionResultBlockParam:
      type: object
      required: [content, return_code, stderr, stdout, type]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/BashCodeExecutionOutputBlockParam"
        return_code: { type: integer }
        stderr: { type: string }
        stdout: { type: string }
        type:
          type: string
          enum: [bash_code_execution_result]

    BashCodeExecutionToolResultBlockParamContent:
      oneOf:
        - $ref: "#/components/schemas/BashCodeExecutionToolResultErrorParam"
        - $ref: "#/components/schemas/BashCodeExecutionResultBlockParam"

    BashCodeExecutionToolResultBlockParam:
      type: object
      required: [content, tool_use_id, type]
      properties:
        content:
          $ref: "#/components/schemas/BashCodeExecutionToolResultBlockParamContent"
        tool_use_id: { type: string }
        type:
          type: string
          enum: [bash_code_execution_tool_result]
        cache_control:
          $ref: "#/components/schemas/CacheControlEphemeral"

    TextEditorCodeExecutionToolResultErrorParam:
      type: object
      required: [error_code, type]
      properties:
        error_code:
          type: string
          enum:
            - invalid_tool_input
            - unavailable
            - too_many_requests
            - execution_time_exceeded
            - file_not_found
        type:
          type: string
          enum: [text_editor_code_execution_tool_result_error]
        error_message:
          type: string

    TextEditorCodeExecutionViewResultBlockParam:
      type: object
      required: [content, file_type, type]
      properties:
        content: { type: string }
        file_type:
          type: string
          enum: [text, image, pdf]
        type:
          type: string
          enum: [text_editor_code_execution_view_result]
        num_lines:
          type: integer
        start_line:
          type: integer
        total_lines:
          type: integer

    TextEditorCodeExecutionCreateResultBlockParam:
      type: object
      required: [is_file_update, type]
      properties:
        is_file_update:
          type: boolean
        type:
          type: string
          enum: [text_editor_code_execution_create_result]

    TextEditorCodeExecutionStrReplaceResultBlockParam:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [text_editor_code_execution_str_replace_result]
        lines:
          type: array
          items:
            type: string
        new_lines:
          type: integer
        new_start:
          type: integer
