          enum: [web_fetch_tool_result]

    CodeExecutionOutputBlock:
      type: object
      required: [file_id, type]
      properties:
        file_id: { type: string }
        type:
          type: string
          enum: [code_execution_output]

    CodeExecutionToolResultError:
      type: object
      required: [error_code, type]
      properties:
        error_code:
          type: string
          enum:
            - invalid_tool_input
            - unavailable
            - too_many_requests
            - execution_time_exceeded
        type:
          type: string
          enum: [code_execution_tool_result_error]

    CodeExecutionResultBlock:
      type: object
      required: [content, return_code, stderr, stdout, type]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/CodeExecutionOutputBlock"
        return_code: { type: integer }
        stderr: { type: string }
        stdout: { type: string }
        type:
          type: string
          enum: [code_execution_result]

    EncryptedCodeExecutionResultBlock:
      type: object
      required: [content, encrypted_stdout, return_code, stderr, type]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/CodeExecutionOutputBlock"
        encrypted_stdout: { type: string }
        return_code: { type: integer }
        stderr: { type: string }
        type:
          type: string
          enum: [encrypted_code_execution_result]

    CodeExecutionToolResultBlockContent:
      oneOf:
        - $ref: "#/components/schemas/CodeExecutionToolResultError"
        - $ref: "#/components/schemas/CodeExecutionResultBlock"
        - $ref: "#/components/schemas/EncryptedCodeExecutionResultBlock"

    CodeExecutionToolResultBlock:
      type: object
      required: [content, tool_use_id, type]
      properties:
        content:
          $ref: "#/components/schemas/CodeExecutionToolResultBlockContent"
        tool_use_id: { type: string }
        type:
          type: string
          enum: [code_execution_tool_result]

    BashCodeExecutionOutputBlock:
      type: object
      required: [file_id, type]
      properties:
        file_id: { type: string }
        type:
          type: string
          enum: [bash_code_execution_output]

    BashCodeExecutionToolResultError:
      type: object
      required: [error_code, type]
      properties:
        error_code:
          type: string
          enum:
            - invalid_tool_input
            - unavailable
            - too_many_requests
            - execution_time_exceeded
            - output_file_too_large
        type:
          type: string
          enum: [bash_code_execution_tool_result_error]

    BashCodeExecutionResultBlock:
      type: object
      required: [content, return_code, stderr, stdout, type]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/BashCodeExecutionOutputBlock"
        return_code: { type: integer }
        stderr: { type: string }
        stdout: { type: string }
        type:
          type: string
          enum: [bash_code_execution_result]

    BashCodeExecutionToolResultBlockContent:
      oneOf:
        - $ref: "#/components/schemas/BashCodeExecutionToolResultError"
        - $ref: "#/components/schemas/BashCodeExecutionResultBlock"

    BashCodeExecutionToolResultBlock:
      type: object
      required: [content, tool_use_id, type]
      properties:
        content:
          $ref: "#/components/schemas/BashCodeExecutionToolResultBlockContent"
        tool_use_id: { type: string }
        type:
          type: string
          enum: [bash_code_execution_tool_result]

    TextEditorCodeExecutionToolResultError:
      type: object
      required: [error_code, error_message, type]
      properties:
        error_code:
          type: string
          enum:
            - invalid_tool_input
            - unavailable
            - too_many_requests
            - execution_time_exceeded
            - file_not_found
        error_message: { type: string }
        type:
          type: string
          enum: [text_editor_code_execution_tool_result_error]

    TextEditorCodeExecutionViewResultBlock:
      type: object
      required: [content, file_type, num_lines, start_line, total_lines, type]
      properties:
        content: { type: string }
        file_type:
          type: string
          enum: [text, image, pdf]
        num_lines: { type: integer }
        start_line: { type: integer }
        total_lines: { type: integer }
        type:
          type: string
          enum: [text_editor_code_execution_view_result]

    TextEditorCodeExecutionCreateResultBlock:
      type: object
      required: [is_file_update, type]
      properties:
        is_file_update:
          type: boolean
        type:
          type: string
          enum: [text_editor_code_execution_create_result]

    TextEditorCodeExecutionStrReplaceResultBlock:
      type: object
      required: [lines, new_lines, new_start, old_lines, old_start, type]
      properties:
        lines:
          type: array
          items:
            type: string
        new_lines: { type: integer }
        new_start: { type: integer }
        old_lines: { type: integer }
        old_start: { type: integer }
        type:
          type: string
          enum: [text_editor_code_execution_str_replace_result]

    TextEditorCodeExecutionToolResultBlockContent:
      oneOf:
        - $ref: "#/components/schemas/TextEditorCodeExecutionToolResultError"
        - $ref: "#/components/schemas/TextEditorCodeExecutionViewResultBlock"
        - $ref: "#/components/schemas/TextEditorCodeExecutionCreateResultBlock"
        - $ref: "#/components/schemas/TextEditorCodeExecutionStrReplaceResultBlock"

    TextEditorCodeExecutionToolResultBlock:
      type: object
      required: [content, tool_use_id, type]
      properties:
        content:
          $ref: "#/components/schemas/TextEditorCodeExecutionToolResultBlockContent"
        tool_use_id: { type: string }
        type:
          type: string
          enum: [text_editor_code_execution_tool_result]

    ToolReferenceBlock:
      type: object
      required: [tool_name, type]
      properties:
        tool_name: { type: string }
        type:
          type: string
          enum: [tool_reference]

    ToolSearchToolResultError:
      type: object
      required: [error_code, error_message, type]
      properties:
        error_code:
          type: string
          enum:
            - invalid_tool_input
            - unavailable
            - too_many_requests
            - execution_time_exceeded
        error_message: { type: string }
        type:
          type: string
          enum: [tool_search_tool_result_error]

    ToolSearchToolSearchResultBlock:
      type: object
      required: [tool_references, type]
      properties:
        tool_references:
          type: array
          items:
            $ref: "#/components/schemas/ToolReferenceBlock"
        type:
          type: string
          enum: [tool_search_tool_search_result]

    ToolSearchToolResultBlockContent:
      oneOf:
        - $ref: "#/components/schemas/ToolSearchToolResultError"
        - $ref: "#/components/schemas/ToolSearchToolSearchResultBlock"

    ToolSearchToolResultBlock:
      type: object
      required: [content, tool_use_id, type]
      properties:
        content:
          $ref: "#/components/schemas/ToolSearchToolResultBlockContent"
        tool_use_id: { type: string }
        type:
          type: string
          enum: [tool_search_tool_result]

    ContainerUploadBlock:
      type: object
      required: [file_id, type]
      properties:
        file_id: { type: string }
        type:
          type: string
          enum: [container_upload]

    ContentBlock:
      oneOf:
        - $ref: "#/components/schemas/TextBlock"
        - $ref: "#/components/schemas/ThinkingBlock"
        - $ref: "#/components/schemas/RedactedThinkingBlock"
        - $ref: "#/components/schemas/ToolUseBlock"
        - $ref: "#/components/schemas/ServerToolUseBlock"
        - $ref: "#/components/schemas/WebSearchToolResultBlock"
        - $ref: "#/components/schemas/WebFetchToolResultBlock"
        - $ref: "#/components/schemas/CodeExecutionToolResultBlock"
        - $ref: "#/components/schemas/BashCodeExecutionToolResultBlock"
        - $ref: "#/components/schemas/TextEditorCodeExecutionToolResultBlock"
        - $ref: "#/components/schemas/ToolSearchToolResultBlock"
        - $ref: "#/components/schemas/ContainerUploadBlock"

    # =========================================================================
    # Container / StopDetails / Usage / Message
    # =========================================================================
    Container:
      type: object
      required: [id, expires_at]
      description: 代码执行容器信息（仅在用了 code execution tool 时返回）。
      properties:
        id: { type: string }
        expires_at:
          type: string
          format: date-time

    RefusalStopDetails:
      type: object
      required: [type]
      description: 结构化 refusal 信息。
      properties:
        category:
          type: string
          enum: [cyber, bio]
          nullable: true
        explanation:
          type: string
          nullable: true
        type:
          type: string
          enum: [refusal]

    StopReason:
      type: string
      nullable: true
      enum:
        - end_turn
        - max_tokens
        - stop_sequence
        - tool_use
        - pause_turn
        - refusal

    CacheCreation:
      type: object
      required: [ephemeral_1h_input_tokens, ephemeral_5m_input_tokens]
      properties:
        ephemeral_1h_input_tokens:
          type: integer
        ephemeral_5m_input_tokens:
          type: integer

    ServerToolUsage:
      type: object
      required: [web_fetch_requests, web_search_requests]
      properties:
        web_fetch_requests:
          type: integer
        web_search_requests:
          type: integer

    Usage:
      type: object
      required: [input_tokens, output_tokens]
      description: 计费/限流相关的 token 用量。
      properties:
        cache_creation:
          $ref: "#/components/schemas/CacheCreation"
          nullable: true
        cache_creation_input_tokens:
          type: integer
          nullable: true
        cache_read_input_tokens:
          type: integer
          nullable: true
        inference_geo:
          type: string
          nullable: true
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        server_tool_use:
          $ref: "#/components/schemas/ServerToolUsage"
          nullable: true
        service_tier:
          type: string
          enum: [standard, priority, batch]
          nullable: true

    Message:
      type: object
      required: [id, content, model, role, stop_reason, type, usage]
      properties:
        id: { type: string }
        container:
          $ref: "#/components/schemas/Container"
          nullable: true
        content:
          type: array
          items:
            $ref: "#/components/schemas/ContentBlock"
        model:
          $ref: "#/components/schemas/Model"
        role:
          type: string
          enum: [assistant]
        stop_details:
          $ref: "#/components/schemas/RefusalStopDetails"
          nullable: true
        stop_reason:
          $ref: "#/components/schemas/StopReason"
        stop_sequence:
          type: string
          nullable: true
        type:
          type: string
          enum: [message]
        usage:
          $ref: "#/components/schemas/Usage"

    # =========================================================================
    # SSE 事件流（8 种事件 oneOf；按 type 字段做内部 tag）
    # =========================================================================
    MessageStartEventMessage:
      type: object
      description: |
        message_start 事件携带的 Message 体；与 /v1/messages 同步返回的
        Message 几乎相同，但 content 总是空数组（在后续 content_block_*
        事件里逐步填充），且 stop_reason / stop_details 为 null。usage
        在此事件里只有 input_tokens / output_tokens 是有效的。
      required: [id, type, role, content, model, stop_reason, stop_sequence, usage]
      properties:
        id: { type: string }
        type:
          type: string
          enum: [message]
        role:
          type: string
          enum: [assistant]
        content:
          type: array
          items:
            $ref: "#/components/schemas/ContentBlock"
        model:
          $ref: "#/components/schemas/Model"
        stop_reason:
          $ref: "#/components/schemas/StopReason"
        stop_sequence:
          type: string
          nullable: true
        usage:
          $ref: "#/components/schemas/Usage"

    MessageStartEvent:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [message_start]
        message:
          $ref: "#/components/schemas/MessageStartEventMessage"

    ContentBlockStartEvent:
      type: object
      required: [type, index, content_block]
      properties:
        type:
          type: string
          enum: [content_block_start]
        index:
          type: integer
        content_block:
          $ref: "#/components/schemas/ContentBlock"

    TextDelta:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [text_delta]
        text:
          type: string

    InputJsonDelta:
      type: object
      required: [type, partial_json]
      description: tool_use input 的 partial JSON（字符串形式逐段流出）。
      properties:
        type:
          type: string
          enum: [input_json_delta]
        partial_json:
          type: string

    ThinkingDelta:
      type: object
      required: [type, thinking]
      properties:
        type:
          type: string
          enum: [thinking_delta]
        thinking:
          type: string

    SignatureDelta:
      type: object
      required: [type, signature]
      properties:
        type:
          type: string
          enum: [signature_delta]
        signature:
          type: string

    CitationsDelta:
      type: object
      required: [type, citation]
      description: |
        citation_delta 事件：每个 delta 携带一条新增的 TextCitation
        （响应版，含 file_id），追加到对应文本块的 citations 数组。
      properties:
        type:
          type: string
          enum: [citations_delta]
        citation:
          $ref: "#/components/schemas/TextCitation"

    ContentBlockDelta:
      oneOf:
        - $ref: "#/components/schemas/TextDelta"
        - $ref: "#/components/schemas/InputJsonDelta"
        - $ref: "#/components/schemas/ThinkingDelta"
        - $ref: "#/components/schemas/SignatureDelta"
        - $ref: "#/components/schemas/CitationsDelta"

    ContentBlockDeltaEvent:
      type: object
      required: [type, index, delta]
      properties:
        type:
          type: string
          enum: [content_block_delta]
        index:
          type: integer
        delta:
          $ref: "#/components/schemas/ContentBlockDelta"

    ContentBlockStopEvent:
      type: object
      required: [type, index]
      properties:
        type:
          type: string
          enum: [content_block_stop]
        index:
          type: integer

    MessageDeltaUpdate:
      type: object
      required: [stop_reason, stop_sequence]
      description: |
        message_delta 事件携带的 message 顶层增量。stop_reason/sequence
        在 turn 收尾时填充。
      properties:
        stop_reason:
          $ref: "#/components/schemas/StopReason"
        stop_sequence:
          type: string
          nullable: true
        stop_details:
          $ref: "#/components/schemas/RefusalStopDetails"
          nullable: true
        container:
          $ref: "#/components/schemas/Container"
          nullable: true

    MessageDeltaUsage:
      type: object
      required: [output_tokens]
      description: |
        message_delta.usage 累积值（注意：是累积，不是增量）。其它
        字段（cache_*、server_tool_use 等）在收尾时也可能填充。
      properties:
        cache_creation:
          $ref: "#/components/schemas/CacheCreation"
          nullable: true
        cache_creation_input_tokens:
          type: integer
          nullable: true
        cache_read_input_tokens:
          type: integer
          nullable: true
        input_tokens:
          type: integer
          nullable: true
        output_tokens:
          type: integer
        server_tool_use:
          $ref: "#/components/schemas/ServerToolUsage"
          nullable: true
        service_tier:
          type: string
          enum: [standard, priority, batch]
          nullable: true

    MessageDeltaEvent:
      type: object
      required: [type, delta, usage]
      properties:
        type:
          type: string
          enum: [message_delta]
        delta:
          $ref: "#/components/schemas/MessageDeltaUpdate"
        usage:
          $ref: "#/components/schemas/MessageDeltaUsage"

    MessageStopEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [message_stop]

    PingEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [ping]

    StreamErrorPayload:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          description: |
            常见值：overloaded_error / api_error / invalid_request_error。
        message:
          type: string

    ErrorEvent:
      type: object
      required: [type, error]
      properties:
        type:
          type: string
          enum: [error]
        error:
          $ref: "#/components/schemas/StreamErrorPayload"

    MessageStreamEvent:
      description: |
        Anthropic SSE 流的单个事件载荷（去掉 SSE 框架后的 JSON）。所有
        变体共享 `type` 字段做 discriminator。客户端必须能容忍未知
        type（按 versioning policy，未来会新增）。
      oneOf:
        - $ref: "#/components/schemas/MessageStartEvent"
        - $ref: "#/components/schemas/ContentBlockStartEvent"
        - $ref: "#/components/schemas/ContentBlockDeltaEvent"
        - $ref: "#/components/schemas/ContentBlockStopEvent"
        - $ref: "#/components/schemas/MessageDeltaEvent"
        - $ref: "#/components/schemas/MessageStopEvent"
        - $ref: "#/components/schemas/PingEvent"
        - $ref: "#/components/schemas/ErrorEvent"

security:
  - ApiKeyAuth: []

paths:
  /v1/models:
    get:
      operationId: listModels
      summary: List available models
      description: 返回当前 API key 可见的全部模型清单。分页字段 v0 不用。
      parameters:
        - name: before_id
          in: query
          required: false
          schema:
            type: string
        - name: after_id
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListModelsResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/messages:
    post:
      operationId: createMessage
      summary: Create a Message
      description: |
        发送一组 user/assistant 消息，让模型生成下一条消息。当 `stream=false`
        时同步返回完整 `Message`；`stream=true` 时返回 SSE 流（按 8 类
        事件序列拼出最终 Message）。客户端通过 `Accept` 头 (`application/json`
        vs `text/event-stream`) 选择 200 响应分支——见 `Request::with_accept`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageParams"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
            text/event-stream:
              schema:
                $ref: "#/components/schemas/MessageStreamEvent"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Request too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "529":
          description: Overloaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
